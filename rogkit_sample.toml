# Preferred location: ~/.config/rogkit/config.toml
# Legacy fallback (still supported by some tools): ~/.rogkit.toml
#
# Credentials and secrets belong in ~/.config/rogkit/secrets.toml (same structure,
# gitignored, excluded from cloud backups). Only non-sensitive config goes here.

[backup]
backup_to = [ "~/archive/",]

# Filename patterns treated as secrets. Sets with include_secrets = false (the
# default) automatically exclude these — use that for any cloud-synced destination.
secret_patterns = ["secrets.toml", ".env"]

# Optional global exclusions (appended to defaults if set)
# file_excludes = [".DS_Store", "*.pyc"]
# folder_excludes = ["__pycache__", "/tmp"]

# Cloud-synced set — secrets excluded automatically
[[backup.set]]
name = "CloudBackup"
destinations = [
    "~/Dropbox/Backups",
    "~/Library/Mobile Documents/com~apple~CloudDocs/Backups"
]
paths = [
    "~/.ssh",
    "~/.config/",
    "~/dev",
    "~/bin",
    "~/.zshrc",
]

# Local-only set — include_secrets = true allows secrets files through
[[backup.set]]
name = "LocalBackup"
include_secrets = true
destinations = ["/mnt/nas/backups", "~/Archive/Backups"]
paths = [
    "~/.ssh",
    "~/.config/",
    "~/dev",
    "~/bin",
    "~/.zshrc",
    "~/.env",
]

# Legacy fallback (used only if no backup.set entries present):
# backup_from = [ "~/",]
# backup_to = [ "~/archive/",]

[media]
# default roots for media tools (cli); pass --path to override
remote_host = "192.168.0.50"
remote_user = "rog"
remote_password = ""
remote_folders = ["/mnt/media1/Media/Movies"]

[plex]
plex_server_url = ""
# plex_server_token → secrets.toml

[spotify]
# spotify_client_id → secrets.toml
# spotify_client_secret → secrets.toml
spotify_redirect_uri = "http://127.0.0.1:8888/callback/"

[purge]
# folders to scan when running `purge.py`; override with --folder if omitted
folders = [
  "~/Media",
]

[vido]
temp_folder = ""
download_folder = ""
default_input_file = ""

