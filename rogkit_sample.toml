# Preferred location: ~/.config/rogkit/config.toml
# Legacy fallback (still supported by some tools): ~/.rogkit.toml

[backup]
backup_to = [ "~/archive/",]
# Optional global exclusions
# file_excludes = [".DS_Store", "*.pyc"]
# folder_excludes = ["__pycache__", "/tmp"]

[[backup.set]]
name = "DocumentsToNAS"
destinations = [
    "/mnt/nas/backups/docs",
    "/mnt/external1/docs"
]
paths = [
    "~/Documents",
    "~/Work/Reports",
    "/etc/hosts"
]

[[backup.set]]
name = "MediaArchive"
destinations = [
    "/mnt/nas/media",
    "/mnt/cloud/media"
]
paths = [
    "~/Pictures",
    "~/Videos"
]

# Legacy fallback (used only if no backup.set entries present):
# backup_from = [ "~/",]
# backup_to = [ "~/archive/",]

[clean]
# path to your translation_clean.sh script
script_path = ""

[openweather]
openweather_api_key = ""

[ipinfo]
ipinfo_api_key = ""

[media]
# default roots for media tools (cli); pass --path to override #
remote_host = "192.168.0.50"
remote_user = "rog"
remote_password = ""
remote_folders = ["/mnt/media1/Media/Movies"]

[plex]
plex_server_url = ""
plex_server_token = ""

[spotify]
spotify_client_id = ""
spotify_client_secret = ""
# Spotify now requires HTTPS redirect URIs
spotify_redirect_uri = "https://your-app.example.com/callback"

[purge]
# folders to scan when running `purge.py`; override with --folder if omitted
folders = [
  "~/Media",
]

[vido]
temp_folder = ""
download_folder = ""
default_input_file = ""


